<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>参加フォーム | MJSS</title><style>:root{--font-family:'Hiragino Sans', 'Yu Gothic', sans-serif;--text-color:#fff;--accent-color:#fff;--button-text-color:#fff;--button-border-color:rgba(255,255,255,0.7);--button-bg-color:rgba(255,255,255,0.04);--nav-text-color:#fff;--nav-border-color:rgba(255,255,255,0.7);--nav-bg-color:rgba(255,255,255,0.04);--page-bg-top:#071326;--page-bg-bottom:#0b1d3a;--heading-size:2.2rem;--body-size:1.05rem;--nav-size:1.1rem;--button-size:1rem}*{box-sizing:border-box}body{margin:0;font-family:var(--font-family);color:var(--text-color);font-size:var(--body-size);background:radial-gradient(circle at top left, rgba(80,120,255,0.18), transparent 30%),radial-gradient(circle at top right, rgba(0,180,255,0.12), transparent 30%),linear-gradient(180deg,var(--page-bg-top),var(--page-bg-bottom))}a{color:inherit}.container{max-width:1100px;margin:0 auto;padding:32px 20px 48px}h1,h2,h3{color:var(--accent-color);line-height:1.2}h1{font-size:var(--heading-size);margin:0 0 18px}p{line-height:1.8;white-space:pre-wrap}.nav-wrap{max-width:1920px;margin:0 auto;padding:10px 12px 0}.site-nav{display:flex;gap:14px;flex-wrap:wrap;align-items:center;justify-content:center;padding:0 0 14px}.site-nav a{text-decoration:none;color:var(--nav-text-color);border:1px solid var(--nav-border-color);background:var(--nav-bg-color);border-radius:999px;padding:16px 28px;font-size:var(--nav-size);font-weight:700}.btn{display:inline-block;margin-top:10px;margin-right:10px;padding:10px 18px;border:1px solid var(--button-border-color);border-radius:999px;text-decoration:none;color:var(--button-text-color);font-weight:bold;background:var(--button-bg-color);font-size:var(--button-size)}.hero{border:1px solid rgba(255,255,255,0.08);border-radius:34px;padding:60px 48px;min-height:520px;background:linear-gradient(0deg, rgba(3,14,38,.45), rgba(3,14,38,.45)),linear-gradient(135deg, rgba(18,41,96,.65), rgba(4,37,86,.5));box-shadow:0 10px 30px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,255,255,.05);background-size:cover;background-position:center}.logo-badge{display:inline-flex;align-items:center;justify-content:center;min-width:120px;min-height:68px;border-radius:999px;background:rgba(255,255,255,.08);padding:10px 22px;margin-bottom:24px;font-size:2.1rem;font-weight:800;overflow:hidden}.logo-badge img{max-width:100%;max-height:54px;display:block;object-fit:contain}.announce{display:inline-block;padding:18px 26px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-size:1.05em;font-weight:700;margin:12px 0 28px}.actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:24px}.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,0.4);backdrop-filter:blur(8px)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;align-items:start}.thumb{width:100%;height:340px;border-radius:16px;background:#334;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.9);font-weight:bold;margin-bottom:18px;overflow:hidden}.thumb-image{width:100%;height:100%;object-fit:contain;object-position:center bottom;display:block}.section-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,0.25)}.meta{opacity:.9;font-size:.95em;margin-bottom:10px}@media (max-width:768px){.site-nav{justify-content:flex-start;overflow:auto;flex-wrap:nowrap;padding-bottom:10px}.site-nav a{padding:12px 18px;white-space:nowrap}.container{padding:20px 16px 36px}.hero{padding:36px 24px;min-height:420px;border-radius:28px}.logo-badge{min-width:92px;min-height:56px;font-size:1.6rem}.thumb{height:280px}}</style></head><body><div class="nav-wrap"><nav class="site-nav" id="site-nav"></nav></div><div class="container"><div class="section-card"><h1 id="page-title"></h1><p class="meta" id="page-lead"></p><div id="page-body"></div><div id="page-button-wrap"></div></div></div><script>function buildImageUrl(rawImage){if(!rawImage||typeof rawImage!=='string')return '';const value=rawImage.trim();if(!value)return '';if(value.startsWith('http://')||value.startsWith('https://'))return value;if(value.startsWith('/'))return value;if(value.startsWith('images/'))return '/'+value;return '/images/uploads/'+value;}async function loadSiteSettings(){try{const res=await fetch('/data/site.json');const site=await res.json();const root=document.documentElement.style;root.setProperty('--font-family',site.font_family||"'Hiragino Sans', 'Yu Gothic', sans-serif");root.setProperty('--text-color',site.text_color||'#fff');root.setProperty('--accent-color',site.accent_color||'#fff');root.setProperty('--button-text-color',site.button_text_color||'#fff');root.setProperty('--button-border-color',site.button_border_color||'rgba(255,255,255,0.7)');root.setProperty('--button-bg-color',site.button_bg_color||'rgba(255,255,255,0.04)');root.setProperty('--nav-text-color',site.nav_text_color||'#fff');root.setProperty('--nav-border-color',site.nav_border_color||'rgba(255,255,255,0.7)');root.setProperty('--nav-bg-color',site.nav_bg_color||'rgba(255,255,255,0.04)');root.setProperty('--page-bg-top',site.page_bg_top||'#071326');root.setProperty('--page-bg-bottom',site.page_bg_bottom||'#0b1d3a');root.setProperty('--heading-size',site.heading_size||'2.2rem');root.setProperty('--body-size',site.body_size||'1.05rem');root.setProperty('--nav-size',site.nav_size||'1.1rem');root.setProperty('--button-size',site.button_size||'1rem');const nav=document.getElementById('site-nav');if(nav){nav.innerHTML='<a href="index.html">ホーム</a><a href="concept.html">理念</a><a href="rules.html">お願い</a><a href="entry.html">参加フォーム</a><a href="next-performers.html">次回参加者</a><a href="past-performers.html">過去参加者</a><a href="creators.html">クリエイター</a><a href="staff.html">スタッフ</a><a href="omake.html">おまけ</a><a href="works.html">仕事依頼</a>';}return site;}catch(e){console.error(e);return {};}}</script><script>(async()=>{await loadSiteSettings();const data=await fetch('/data/entry-page.json').then(r=>r.json());document.getElementById('page-title').textContent=data.title||'';document.getElementById('page-lead').textContent=data.lead||'';document.getElementById('page-body').innerHTML='<p>'+((data.body||'').replace(/\n/g,'<br>'))+'</p>';if(data.button_label&&data.button_url){document.getElementById('page-button-wrap').innerHTML='<a class="btn" href="'+data.button_url+'" target="_blank" rel="noopener noreferrer">'+data.button_label+'</a>';}})();</script></body></html>
