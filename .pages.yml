media:
  input: images/uploads
  output: /images/uploads

content:
  - name: site
    label: サイト共通
    type: file
    path: data/site.json
    fields:
      - { name: site_name, label: サイト名, type: string }
      - { name: hero_title, label: トップ見出し, type: string }
      - { name: hero_lead, label: トップ説明文, type: text }
      - { name: announcement, label: お知らせ, type: text }
      - { name: hero_logo_image, label: ホームロゴ画像, type: image }
      - { name: hero_bg_image, label: ホーム背景画像, type: image }
      - { name: next_date_label, label: 次回開催見出し, type: string }
      - { name: next_date_1, label: 開催日1 日付, type: string }
      - { name: next_date_1_sub, label: 開催日1 曜日, type: string }
      - { name: next_date_1_note, label: 開催日1 補足, type: string }
      - { name: next_date_2, label: 開催日2 日付, type: string }
      - { name: next_date_2_sub, label: 開催日2 曜日, type: string }
      - { name: next_date_2_note, label: 開催日2 補足, type: string }
      - { name: next_date_3, label: 開催日3 日付, type: string }
      - { name: next_date_3_sub, label: 開催日3 曜日, type: string }
      - { name: next_date_3_note, label: 開催日3 補足, type: string }

      - name: font_preset
        label: フォント
        type: select
        options:
          values:
            - { label: ゴシック, value: gothic }
            - { label: 明朝, value: mincho }
            - { label: ポップ, value: pop }
            - { label: シンプル, value: stylish }

      - name: theme_preset
        label: カラー
        type: select
        options:
          values:
            - { label: 濃紺, value: midnight }
            - { label: 水色, value: aqua_pop }
            - { label: 夕焼け, value: sunset }

      - name: text_scale_preset
        label: 文字サイズ
        type: select
        options:
          values:
            - { label: 小, value: small }
            - { label: 中, value: medium }
            - { label: 大, value: large }
            - { label: 特大, value: xlarge }

      - name: nav_style_preset
        label: 上ナビの見た目
        type: select
        options:
          values:
            - { label: 枠線あり, value: outline }
            - { label: 塗りつぶし, value: solid }
            - { label: ガラス風, value: glass }

  - name: concept_page
    label: 理念ページ
    type: file
    path: data/concept-page.json
    fields:
      - name: blocks
        label: コンテンツ
        type: object
        list: true
        fields:
          - name: type
            label: 種類
            type: select
            options:
              values:
                - { label: 特大見出し, value: hero_title }
                - { label: 見出し, value: heading }
                - { label: 中見出し, value: subheading }
                - { label: 本文, value: body }
                - { label: 引用, value: quote }
                - { label: 強調, value: emphasis }
                - { label: 署名, value: signature }
                - { label: 余白 小, value: spacer_small }
                - { label: 余白 中, value: spacer_medium }
                - { label: 余白 大, value: spacer_large }
                - { label: 画像, value: image }
          - { name: text, label: 内容, type: text, required: false }
          - { name: image, label: 画像, type: image, required: false }

  - name: rules_page
    label: お願いページ
    type: file
    path: data/rules-page.json
    fields:
      - name: blocks
        label: コンテンツ
        type: object
        list: true
        fields:
          - name: type
            label: 種類
            type: select
            options:
              values:
                - { label: 見出し, value: heading }
                - { label: 中見出し, value: subheading }
                - { label: 本文, value: body }
                - { label: 引用, value: quote }
                - { label: 強調, value: emphasis }
                - { label: 署名, value: signature }
                - { label: 余白 小, value: spacer_small }
                - { label: 余白 中, value: spacer_medium }
                - { label: 余白 大, value: spacer_large }
                - { label: 画像, value: image }
          - { name: text, label: 内容, type: text, required: false }
          - { name: image, label: 画像, type: image, required: false }

  - name: entry_page
    label: 参加フォームページ
    type: file
    path: data/entry-page.json
    fields:
      - name: blocks
        label: コンテンツ
        type: object
        list: true
        fields:
          - name: type
            label: 種類
            type: select
            options:
              values:
                - { label: 見出し, value: heading }
                - { label: 中見出し, value: subheading }
                - { label: 本文, value: body }
                - { label: 引用, value: quote }
                - { label: 強調, value: emphasis }
                - { label: 署名, value: signature }
                - { label: 余白 小, value: spacer_small }
                - { label: 余白 中, value: spacer_medium }
                - { label: 余白 大, value: spacer_large }
                - { label: 画像, value: image }
          - { name: text, label: 内容, type: text, required: false }
          - { name: image, label: 画像, type: image, required: false }

  - name: works_page
    label: 仕事依頼ページ
    type: file
    path: data/works-page.json
    fields:
      - name: blocks
        label: コンテンツ
        type: object
        list: true
        fields:
          - name: type
            label: 種類
            type: select
            options:
              values:
                - { label: 見出し, value: heading }
                - { label: 中見出し, value: subheading }
                - { label: 本文, value: body }
                - { label: 引用, value: quote }
                - { label: 強調, value: emphasis }
                - { label: 署名, value: signature }
                - { label: 余白 小, value: spacer_small }
                - { label: 余白 中, value: spacer_medium }
                - { label: 余白 大, value: spacer_large }
                - { label: 画像, value: image }
          - { name: text, label: 内容, type: text, required: false }
          - { name: image, label: 画像, type: image, required: false }

  - name: staff_page
    label: スタッフページ
    type: file
    path: data/staff-page.json
    fields:
      - name: blocks
        label: コンテンツ
        type: object
        list: true
        fields:
          - name: type
            label: 種類
            type: select
            options:
              values:
                - { label: 見出し, value: heading }
                - { label: 中見出し, value: subheading }
                - { label: 本文, value: body }
                - { label: 引用, value: quote }
                - { label: 強調, value: emphasis }
                - { label: 署名, value: signature }
                - { label: 余白 小, value: spacer_small }
                - { label: 余白 中, value: spacer_medium }
                - { label: 余白 大, value: spacer_large }
                - { label: 画像, value: image }
          - { name: text, label: 内容, type: text, required: false }
          - { name: image, label: 画像, type: image, required: false }

  - name: omake_page
    label: おまけページ
    type: file
    path: data/omake-page.json
    fields:
      - name: blocks
        label: コンテンツ
        type: object
        list: true
        fields:
          - name: type
            label: 種類
            type: select
            options:
              values:
                - { label: 見出し, value: heading }
                - { label: 中見出し, value: subheading }
                - { label: 本文, value: body }
                - { label: 引用, value: quote }
                - { label: 強調, value: emphasis }
                - { label: 署名, value: signature }
                - { label: 余白 小, value: spacer_small }
                - { label: 余白 中, value: spacer_medium }
                - { label: 余白 大, value: spacer_large }
                - { label: 画像, value: image }
          - { name: text, label: 内容, type: text, required: false }
          - { name: image, label: 画像, type: image, required: false }

  - name: omake_links
    label: おまけ一覧
    type: file
    path: data/omake-links.json
    fields:
      - name: items
        label: おまけカード一覧
        type: object
        list: true
        fields:
          - { name: title, label: タイトル, type: string }
          - { name: description, label: 説明文, type: text, required: false }
          - { name: image, label: サムネ画像, type: image, required: false }
          - { name: url, label: リンク先, type: string }

          - name: type
            label: 種類
            type: select
            options:
              values:
                - { label: ミニゲーム, value: ミニゲーム }
                - { label: ブログ, value: ブログ }
                - { label: 隠しページ, value: 隠しページ }
                - { label: 開発中, value: 開発中 }
                - { label: おまけ, value: おまけ }

          - name: badge
            label: バッジ
            type: select
            options:
              values:
                - { label: なし, value: "" }
                - { label: NEW, value: NEW }
                - { label: おすすめ, value: おすすめ }
                - { label: 人気, value: 人気 }
                - { label: 限定, value: 限定 }

          - name: status
            label: 公開状態
            type: select
            options:
              values:
                - { label: 公開, value: public }
                - { label: 非公開, value: private }

          - { name: featured, label: おすすめ表示, type: boolean, required: false }

  - name: next_performers
    label: 次回参加者
    type: file
    path: data/next-performers.json
    fields:
      - name: items
        label: 次回参加者一覧
        type: object
        list: true
        fields:
          - { name: name, label: 名前, type: string }
          - { name: tags, label: タグ, type: string, list: true, required: false }
          - { name: description, label: 紹介文, type: text, required: false }
          - { name: image, label: 画像, type: image, required: false }
          - { name: x_url, label: Xリンク, type: string, required: false }
          - { name: media_url, label: 媒体リンク, type: string, required: false }

  - name: past_performers
    label: 過去参加者
    type: file
    path: data/past-performers.json
    fields:
      - name: items
        label: 過去参加者一覧
        type: object
        list: true
        fields:
          - { name: name, label: 名前, type: string }
          - { name: tags, label: タグ, type: string, list: true, required: false }
          - { name: description, label: 紹介文, type: text, required: false }
          - { name: image, label: 画像, type: image, required: false }
          - { name: x_url, label: Xリンク, type: string, required: false }
          - { name: media_url, label: 媒体リンク, type: string, required: false }

  - name: creators
    label: クリエイター
    type: file
    path: data/creators.json
    fields:
      - name: items
        label: クリエイター一覧
        type: object
        list: true
        fields:
          - { name: name, label: 名前, type: string }
          - { name: role, label: 役割, type: string, required: false }
          - { name: description, label: 紹介文, type: text, required: false }
          - { name: image, label: 画像, type: image, required: false }
          - { name: x_url, label: Xリンク, type: string, required: false }
          - { name: portfolio_url, label: ポートフォリオ, type: string, required: false }

  - name: staff_list
    label: スタッフ一覧
    type: file
    path: data/staff-list.json
    fields:
      - name: items
        label: スタッフ一覧
        type: object
        list: true
        fields:
          - { name: name, label: 名前, type: string }
          - { name: role, label: 役割, type: string, required: false }
          - { name: description, label: 紹介文, type: text, required: false }
          - { name: image, label: 画像, type: image, required: false }

  - name: staff_blog
    label: スタッフブログ
    type: file
    path: data/staff-blog.json
    fields:
      - name: items
        label: 記事一覧
        type: object
        list: true
        fields:
          - { name: title, label: タイトル, type: string }
          - { name: date, label: 日付, type: string, required: false }
          - { name: body, label: 本文, type: text, required: false }

  - name: invader_config
    label: インベーダー設定
    type: file
    path: data/invader-config.json
    fields:
      - name: images
        label: 画像設定
        type: object
        fields:
          - { name: player, label: 自機画像, type: image, required: false }
          - { name: enemy, label: 敵画像, type: image, required: false }
          - { name: bullet, label: 弾画像, type: image, required: false }
          - { name: barrier, label: バリア画像, type: image, required: false }
          - { name: rare_enemy, label: レア敵画像, type: image, required: false }
          - { name: enemy_bullet, label: 敵弾画像, type: image, required: false }
          - { name: background, label: 背景画像, type: image, required: false }

      - name: gameplay
        label: ゲーム設定
        type: object
        fields:
          - { name: player_speed, label: プレイヤー速度, type: number, required: false }
          - { name: bullet_speed, label: 弾速度, type: number, required: false }
          - { name: enemy_speed, label: 敵速度, type: number, required: false }
          - { name: enemy_bullet_speed, label: 敵弾速度, type: number, required: false }
          - { name: initial_lives, label: 初期残機, type: number, required: false }
          - { name: barrier_hp, label: バリア耐久, type: number, required: false }
          - { name: wave_speed_step, label: Waveごとの速度増加量, type: number, required: false }
          - { name: rare_enemy_spawn_rate, label: レア敵出現率, type: number, required: false }
          - { name: rare_enemy_score, label: レア敵スコア, type: number, required: false }
          - { name: enemy_score, label: 通常敵スコア, type: number, required: false }

      - name: ui
        label: UI設定
        type: object
        fields:
          - { name: game_title, label: ゲームタイトル, type: string, required: false }
          - { name: start_message, label: スタート文言, type: string, required: false }
          - { name: gameover_message, label: ゲームオーバー文言, type: string, required: false }
          - { name: show_mobile_controls, label: スマホ操作ボタンを表示, type: boolean, required: false }
          - { name: allow_sound_toggle, label: 音ON/OFF切り替えを表示, type: boolean, required: false }
          - { name: enable_screen_shake, label: 画面揺れを有効化, type: boolean, required: false }
          - { name: enable_hit_flash, label: ヒットフラッシュを有効化, type: boolean, required: false }

      - name: theme
        label: 見た目設定
        type: object
        fields:
          - { name: background_color, label: 背景色, type: string, required: false }
          - { name: accent_color, label: アクセント色, type: string, required: false }
          - { name: text_color, label: 文字色, type: string, required: false }
          - { name: flash_color, label: フラッシュ色, type: string, required: false }

  - name: sounds
    label: サウンド設定
    type: file
    path: data/sounds.json
    fields:
      - name: invader
        label: インベーダー用サウンド
        type: object
        fields:
          - name: bgm
            label: BGM
            type: file
            required: false
            options:
              extensions: [mp3, wav, ogg, m4a]
          - name: shot
            label: ショット音
            type: file
            required: false
            options:
              extensions: [mp3, wav, ogg, m4a]
          - name: explosion
            label: 敵の爆発音
            type: file
            required: false
            options:
              extensions: [mp3, wav, ogg, m4a]
          - name: gameover
            label: ゲームオーバー音
            type: file
            required: false
            options:
              extensions: [mp3, wav, ogg, m4a]
          - name: start
            label: スタート音
            type: file
            required: false
            options:
              extensions: [mp3, wav, ogg, m4a]

