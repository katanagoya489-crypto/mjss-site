media:
  input: images/uploads
  output: /images/uploads

content:
  - name: site
    label: サイト共通
    type: file
    path: data/site.json
    fields:
      - { name: site_name, label: サイト名, type: string }
      - { name: hero_title, label: トップ見出し, type: string }
      - { name: hero_lead, label: トップ説明文, type: text }
      - { name: announcement, label: お知らせ, type: text }
      - { name: hero_logo_image, label: ホームロゴ画像, type: image }
      - { name: hero_bg_image, label: ホーム背景画像, type: image }
      - { name: next_date_label, label: 次回開催見出し, type: string }
      - { name: next_date_1, label: 開催日1 日付, type: string }
      - { name: next_date_1_sub, label: 開催日1 曜日, type: string }
      - { name: next_date_1_note, label: 開催日1 補足, type: string }
      - { name: next_date_2, label: 開催日2 日付, type: string }
      - { name: next_date_2_sub, label: 開催日2 曜日, type: string }
      - { name: next_date_2_note, label: 開催日2 補足, type: string }
      - { name: next_date_3, label: 開催日3 日付, type: string }
      - { name: next_date_3_sub, label: 開催日3 曜日, type: string }
      - { name: next_date_3_note, label: 開催日3 補足, type: string }
      - { name: font_family, label: 全体フォント指定, type: string }
      - { name: text_color, label: 全体文字色, type: string }
      - { name: heading_color, label: 見出し・強調色, type: string }
      - { name: button_text_color, label: ボタン文字色, type: string }
      - { name: button_border_color, label: ボタン枠線色, type: string }
      - { name: button_bg_color, label: ボタン背景色, type: string }
      - { name: nav_text_color, label: 上ナビ文字色, type: string }
      - { name: nav_border_color, label: 上ナビ枠線色, type: string }
      - { name: nav_bg_color, label: 上ナビ背景色, type: string }
      - { name: bg_top_color, label: ページ背景色（上）, type: string }
      - { name: bg_bottom_color, label: ページ背景色（下）, type: string }
      - { name: heading_size, label: 見出し文字サイズ, type: string }
      - { name: body_size, label: 本文文字サイズ, type: string }
      - { name: nav_size, label: 上ナビ文字サイズ, type: string }
      - { name: button_size, label: ボタン文字サイズ, type: string }

  - name: concept_page
    label: 理念ページ
    type: file
    path: data/concept-page.json
    fields:
      - { name: title, label: タイトル, type: string }
      - { name: body, label: 本文, type: text }

  - name: rules_page
    label: お願いページ
    type: file
    path: data/rules-page.json
    fields:
      - { name: title, label: タイトル, type: string }
      - { name: body, label: 本文, type: text }

  - name: entry_page
    label: 参加フォームページ
    type: file
    path: data/entry-page.json
    fields:
      - { name: title, label: タイトル, type: string }
      - { name: body, label: 本文, type: text }

  - name: works_page
    label: 仕事依頼ページ
    type: file
    path: data/works-page.json
    fields:
      - { name: title, label: タイトル, type: string }
      - { name: body, label: 本文, type: text }

  - name: staff_page
    label: スタッフページ
    type: file
    path: data/staff-page.json
    fields:
      - { name: title, label: タイトル, type: string }
      - { name: body, label: 本文, type: text }

  - name: omake_page
    label: おまけページ
    type: file
    path: data/omake-page.json
    fields:
      - { name: title, label: タイトル, type: string }
      - { name: body, label: 本文, type: text }

  - name: next_performers
    label: 次回参加者
    type: file
    path: data/next-performers.json
    fields:
      - name: items
        label: 次回参加者一覧
        type: object
        list: true
        fields:
          - { name: name, label: 名前, type: string }
          - { name: tags, label: タグ, type: string, list: true }
          - { name: description, label: 紹介文, type: text }
          - { name: image, label: 立ち絵画像, type: image }
          - { name: x_url, label: Xリンク, type: string }
          - { name: media_url, label: 媒体リンク, type: string }

  - name: past_performers
    label: 過去参加者
    type: file
    path: data/past-performers.json
    fields:
      - name: items
        label: 過去参加者一覧
        type: object
        list: true
        fields:
          - { name: name, label: 名前, type: string }
          - { name: tags, label: タグ, type: string, list: true }
          - { name: description, label: 紹介文, type: text }
          - { name: image, label: 立ち絵画像, type: image }
          - { name: x_url, label: Xリンク, type: string }
          - { name: media_url, label: 媒体リンク, type: string }

  - name: creators
    label: クリエイター
    type: file
    path: data/creators.json
    fields:
      - name: items
        label: クリエイター一覧
        type: object
        list: true
        fields:
          - { name: name, label: 名前, type: string }
          - { name: role, label: 担当分野, type: string }
          - { name: description, label: 紹介文, type: text }
          - { name: image, label: 作品画像, type: image }
          - { name: x_url, label: Xリンク, type: string }
          - { name: portfolio_url, label: ポートフォリオ, type: string }

  - name: staff_list
    label: スタッフ一覧
    type: file
    path: data/staff-list.json
    fields:
      - name: items
        label: スタッフ一覧
        type: object
        list: true
        fields:
          - { name: name, label: 名前, type: string }
          - { name: role, label: 役割, type: string }
          - { name: description, label: 紹介文, type: text }
          - { name: image, label: 画像, type: image }

  - name: staff_blog
    label: スタッフブログ
    type: file
    path: data/staff-blog.json
    fields:
      - name: items
        label: 記事一覧
        type: object
        list: true
        fields:
          - { name: title, label: タイトル, type: string }
          - { name: date, label: 日付, type: string }
          - { name: body, label: 本文, type: text }
