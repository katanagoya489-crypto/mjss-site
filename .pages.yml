media:
  input: images/uploads
  output: /images/uploads

content:
  - name: site
    label: サイト共通
    type: file
    path: data/site.json
    fields:
      - { name: site_name, label: サイト名, type: string }
      - { name: hero_title, label: トップ見出し, type: string }
      - { name: hero_lead, label: トップ説明文, type: text }
      - { name: announcement, label: お知らせ, type: text }
      - { name: hero_logo_image, label: ホームロゴ画像, type: image }
      - { name: hero_bg_image, label: ホーム背景画像, type: image }

      - name: font_preset
        label: フォント
        type: select
        options:
          values:
            - { label: ゴシック, value: gothic }
            - { label: 明朝, value: mincho }
            - { label: ポップ, value: pop }
            - { label: シンプル, value: stylish }

      - name: theme_preset
        label: カラー
        type: select
        options:
          values:
            - { label: 濃紺, value: midnight }
            - { label: 水色, value: aqua_pop }
            - { label: 夕焼け, value: sunset }

      - name: text_scale_preset
        label: 文字サイズ
        type: select
        options:
          values:
            - { label: 小, value: small }
            - { label: 中, value: medium }
            - { label: 大, value: large }

---

  - name: concept_page
    label: 理念ページ
    type: file
    path: data/concept.json
    fields:
      - name: blocks
        label: コンテンツ
        type: object
        list: true
        fields:
          - name: type
            label: 種類
            type: select
            options:
              values:
                - { label: 特大見出し, value: hero }
                - { label: 見出し, value: heading }
                - { label: 本文, value: body }
                - { label: 引用, value: quote }
                - { label: 強調, value: emphasis }
                - { label: 余白, value: spacer }

          - { name: text, label: 内容, type: text }

