<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>MJSS | HOME</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background:
        radial-gradient(circle at top left, rgba(80,120,255,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(0,180,255,0.12), transparent 30%),
        linear-gradient(180deg, #071326, #0b1d3a);
      color: #fff;
      min-height: 100vh;
    }

    .top-nav {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 20px 0;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav-btn {
      display: inline-block;
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      background: rgba(255,255,255,0.04);
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: #fff;
      transform: translateY(-1px);
    }

    .hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    .hero-card {
      border-radius: 24px;
      min-height: 420px;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(rgba(7,19,38,0.55), rgba(11,29,58,0.72)),
        linear-gradient(135deg, rgba(80,120,255,0.22), rgba(0,180,255,0.10));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
      display: flex;
      align-items: flex-end;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    .hero-inner {
      padding: 36px 28px;
      width: 100%;
      backdrop-filter: blur(3px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      min-width: 44px;
      max-width: 220px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      font-weight: bold;
      margin-bottom: 18px;
      overflow: hidden;
    }

    .eyebrow-logo {
      max-height: 34px;
      max-width: 180px;
      width: auto;
      display: block;
    }

    h1 {
      font-size: 3rem;
      margin: 0 0 16px;
      line-height: 1.1;
    }

    .lead {
      font-size: 1.12rem;
      line-height: 1.8;
      max-width: 720px;
      margin: 0 0 20px;
      white-space: pre-wrap;
    }

    .announcement {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      margin-bottom: 20px;
      white-space: pre-wrap;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    .hero-btn {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.06);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .hero-btn:hover {
      background: rgba(255,255,255,0.16);
      transform: translateY(-1px);
    }

    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      text-decoration: none;
      color: #fff;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 36px rgba(0,0,0,0.35);
      background: rgba(255,255,255,0.08);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }

    .card p {
      margin: 0;
      line-height: 1.7;
      color: rgba(255,255,255,0.88);
    }

    @media (max-width: 768px) {
      .hero {
        padding-top: 16px;
      }
      .hero-card {
        min-height: 380px;
      }
      .hero-inner {
        padding: 28px 20px;
      }
      h1 {
        font-size: 2.2rem;
      }
      .lead {
        font-size: 1rem;
      }
      .eyebrow-logo {
        max-width: 140px;
        max-height: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="top-nav">
    <div class="nav-links">
      <a href="index.html" class="nav-btn">ホーム</a>
      <a href="concept.html" class="nav-btn">理念</a>
      <a href="rules.html" class="nav-btn">お願い</a>
      <a href="entry.html" class="nav-btn">参加フォーム</a>
      <a href="next-performers.html" class="nav-btn">次回参加者</a>
      <a href="past-performers.html" class="nav-btn">過去参加者</a>
      <a href="creators.html" class="nav-btn">クリエイター</a>
      <a href="works.html" class="nav-btn">仕事依頼</a>
    </div>
  </div>

  <section class="hero">
    <div class="hero-card" id="hero-card">
      <div class="hero-inner">
        <div class="eyebrow" id="site-name-wrap">
          <span id="site-name">MJSS</span>
        </div>
        <h1 id="hero-title">MJSS LIVE</h1>
        <div class="announcement" id="announcement">お知らせをここに表示</div>
        <p class="lead" id="hero-lead">トップ説明文</p>
        <div class="hero-actions">
          <a class="hero-btn" href="next-performers.html">次回参加者を見る</a>
          <a class="hero-btn" href="creators.html">クリエイターを見る</a>
          <a class="hero-btn" href="entry.html">参加フォームへ</a>
        </div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="grid">
      <a class="card" href="concept.html">
        <h2>ライブ理念</h2>
        <p>イベントの想いや空気感をまとめたページです。</p>
      </a>
      <a class="card" href="rules.html">
        <h2>お客さんへのお願い</h2>
        <p>当日の楽しみ方やルールを確認できます。</p>
      </a>
      <a class="card" href="next-performers.html">
        <h2>次回参加者</h2>
        <p>次回イベントの出演者・参加者を掲載します。</p>
      </a>
      <a class="card" href="past-performers.html">
        <h2>過去参加者</h2>
        <p>これまでの参加者アーカイブです。</p>
      </a>
      <a class="card" href="creators.html">
        <h2>クリエイター</h2>
        <p>関わるクリエイターや制作陣を紹介します。</p>
      </a>
      <a class="card" href="works.html">
        <h2>ポートフォリオ / 仕事依頼</h2>
        <p>外部仕事・制作依頼への導線です。</p>
      </a>
    </div>
  </section>

  <script>
    function buildAssetUrl(raw) {
      if (!raw || typeof raw !== 'string') return '';
      const value = raw.trim();
      if (!value) return '';
      if (value.startsWith('http://') || value.startsWith('https://')) return value;
      if (value.startsWith('/')) return value;
      if (value.startsWith('images/')) return '/' + value;
      return '/images/uploads/' + value;
    }

    async function loadSite() {
      try {
        const res = await fetch('/data/site.json');
        const data = await res.json();

        const siteNameWrap = document.getElementById('site-name-wrap');
        const siteName = document.getElementById('site-name');
        const title = document.getElementById('hero-title');
        const lead = document.getElementById('hero-lead');
        const announcement = document.getElementById('announcement');
        const heroCard = document.getElementById('hero-card');

        if (siteName) siteName.textContent = data.site_name || 'MJSS';
        if (title) title.textContent = data.hero_title || 'MJSS LIVE';
        if (lead) lead.textContent = data.hero_lead || '';
        if (announcement) announcement.textContent = data.announcement || '';

        const bg = buildAssetUrl(data.hero_background);
        if (bg) {
          heroCard.style.backgroundImage = `linear-gradient(rgba(7,19,38,0.45), rgba(11,29,58,0.70)), url('${bg}')`;
        }

        const logo = buildAssetUrl(data.logo_image);
        if (logo && siteNameWrap) {
          siteNameWrap.innerHTML = `<img src="${logo}" alt="${data.site_name || 'MJSS'}" class="eyebrow-logo">`;
        }
      } catch (e) {
        console.error('site.json 読み込み失敗', e);
      }
    }

    loadSite();
  </script>
</body>
</html>
