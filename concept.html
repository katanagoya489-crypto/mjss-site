<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>理念 | MJSS</title>
  <style>
    :root {
      --font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
      --bg-top: #071326;
      --bg-bottom: #0b1d3a;
      --text-color: #ffffff;
      --heading-color: #ffffff;
      --subtext-color: rgba(255,255,255,0.92);
      --nav-bg: rgba(5,19,40,0.82);
      --nav-text: #ffffff;
      --nav-border: rgba(255,255,255,0.7);
      --page-overlay: rgba(2,14,34,0.66);
      --page-overlay-strong: rgba(2,14,34,0.80);
      --surface: rgba(255,255,255,0.06);
      --surface-border: rgba(255,255,255,0.10);
      --accent-color: #ffffff;
      --nav-size: 1.2rem;
      --body-size: 1.05rem;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font-family);
      color: var(--text-color);
      font-size: var(--body-size);
      background:
        radial-gradient(circle at top left, rgba(58,116,255,0.14), transparent 26%),
        radial-gradient(circle at top right, rgba(0,153,255,0.10), transparent 30%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      min-height: 100vh;
      position: relative;
    }

    body.has-page-bg::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image: var(--page-bg-image);
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      filter: saturate(0.96) contrast(0.95);
    }

    body.has-page-bg::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(180deg, var(--page-overlay), var(--page-overlay-strong)),
        radial-gradient(circle at top left, rgba(58,116,255,0.10), transparent 30%),
        radial-gradient(circle at top right, rgba(255,76,76,0.08), transparent 24%);
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .site-nav-wrap {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      background: rgba(3,13,28,0.76);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .site-nav {
      width: min(1600px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: center;
    }

    .site-nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      padding: 0 32px;
      border-radius: 999px;
      background: var(--nav-bg);
      color: var(--nav-text);
      border: 2px solid var(--nav-border);
      font-size: var(--nav-size);
      font-weight: 800;
      letter-spacing: 0.02em;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      white-space: nowrap;
    }

    .site-nav a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(0,0,0,0.25);
    }

    .page {
      width: min(1680px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 48px;
    }

    .page-card {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 28px;
      padding: 32px;
      backdrop-filter: blur(5px);
      box-shadow: 0 16px 36px rgba(0,0,0,0.18);
    }

    .block-stack {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .block-hero-title {
      font-size: clamp(2.6rem, 5vw, 5rem);
      font-weight: 900;
      line-height: 1.12;
      color: var(--heading-color);
      letter-spacing: -0.04em;
    }

    .block-heading {
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      font-weight: 900;
      line-height: 1.28;
      color: var(--heading-color);
    }

    .block-subheading {
      font-size: clamp(1.25rem, 2.2vw, 1.8rem);
      font-weight: 800;
      line-height: 1.5;
      color: var(--accent-color);
    }

    .block-body {
      font-size: 1.12rem;
      line-height: 1.95;
      color: var(--subtext-color);
      white-space: pre-wrap;
    }

    .block-quote {
      font-size: clamp(1.2rem, 2.2vw, 1.55rem);
      line-height: 1.9;
      color: rgba(255,255,255,0.94);
      padding-left: 18px;
      border-left: 4px solid rgba(255,255,255,0.36);
      white-space: pre-wrap;
    }

    .block-emphasis {
      font-size: clamp(2.2rem, 4.4vw, 4rem);
      font-weight: 900;
      line-height: 1.18;
      color: var(--heading-color);
      letter-spacing: -0.03em;
    }

    .block-signature {
      text-align: right;
      font-size: clamp(1.5rem, 3vw, 2.3rem);
      font-weight: 900;
      color: var(--heading-color);
    }

    .block-spacer-small { height: 14px; }
    .block-spacer-medium { height: 32px; }
    .block-spacer-large { height: 56px; }

    .block-image img {
      width: 100%;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .footer {
      margin-top: 56px;
      padding: 28px 0 52px;
      color: rgba(255,255,255,0.68);
      text-align: center;
      font-size: 0.96rem;
    }

    @media (max-width: 768px) {
      .site-nav {
        justify-content: flex-start;
        overflow-x: auto;
        flex-wrap: nowrap;
        padding: 14px 0;
      }

      .site-nav a {
        min-height: 52px;
        padding: 0 22px;
        font-size: 1rem;
      }

      .page {
        width: calc(100% - 20px);
      }

      .page-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="site-nav-wrap">
    <nav class="site-nav">
      <a href="index.html">ホーム</a>
      <a href="concept.html">理念</a>
      <a href="rules.html">お願い</a>
      <a href="entry.html">参加フォーム</a>
      <a href="next-performers.html">次回参加者</a>
      <a href="past-performers.html">過去参加者</a>
      <a href="creators.html">クリエイター</a>
      <a href="staff.html">スタッフ</a>
      <a href="omake.html">おまけ</a>
      <a href="works.html">仕事依頼</a>
    </nav>
  </div>

  <main class="page">
    <section class="page-card">
      <div class="block-stack" id="conceptBlocks"></div>
    </section>

    <footer class="footer">© MJSS</footer>
  </main>

  <script>
    function mjssSafe(value, fallback = '') {
      return value === undefined || value === null || value === '' ? fallback : value;
    }

    function mjssBuildImageUrl(rawImage) {
      if (!rawImage || typeof rawImage !== 'string') return '';
      const value = rawImage.trim();
      if (!value) return '';
      if (value.startsWith('http://') || value.startsWith('https://')) return value;
      if (value.startsWith('/')) return value;
      if (value.startsWith('images/')) return '/' + value;
      return '/images/uploads/' + value;
    }

    function mjssPresetMap(site) {
      const fontPreset = site.font_preset || 'gothic';
      const themePreset = site.theme_preset || 'midnight';
      const textScalePreset = site.text_scale_preset || 'medium';
      const navStylePreset = site.nav_style_preset || 'outline';

      const fontMap = {
        gothic: "'Hiragino Sans', 'Yu Gothic', sans-serif",
        mincho: "'Yu Mincho', 'Hiragino Mincho ProN', serif",
        pop: "'Trebuchet MS', 'Hiragino Sans', sans-serif",
        stylish: "'Arial', 'Helvetica Neue', sans-serif"
      };

      const themeMap = {
        midnight: {
          bgTop: '#071326',
          bgBottom: '#0b1d3a',
          text: '#ffffff',
          heading: '#ffffff',
          subtext: 'rgba(255,255,255,0.9)',
          navBg: 'rgba(5,19,40,0.82)',
          navText: '#ffffff',
          navBorder: 'rgba(255,255,255,0.72)',
          pageOverlay: 'rgba(2,14,34,0.64)',
          pageOverlayStrong: 'rgba(2,14,34,0.80)',
          surface: 'rgba(255,255,255,0.06)',
          surfaceBorder: 'rgba(255,255,255,0.10)',
          accent: '#ffffff'
        },
        aqua_pop: {
          bgTop: '#061a26',
          bgBottom: '#0c3342',
          text: '#f7ffff',
          heading: '#ffffff',
          subtext: 'rgba(247,255,255,0.92)',
          navBg: 'rgba(0,110,130,0.34)',
          navText: '#ffffff',
          navBorder: 'rgba(108,255,243,0.8)',
          pageOverlay: 'rgba(4,24,32,0.58)',
          pageOverlayStrong: 'rgba(4,24,32,0.76)',
          surface: 'rgba(15,180,170,0.12)',
          surfaceBorder: 'rgba(108,255,243,0.18)',
          accent: '#7ff8ec'
        },
        sunset: {
          bgTop: '#1a1024',
          bgBottom: '#3a1532',
          text: '#fff8f2',
          heading: '#fff5ef',
          subtext: 'rgba(255,248,242,0.9)',
          navBg: 'rgba(94,33,69,0.48)',
          navText: '#fff8f2',
          navBorder: 'rgba(255,186,136,0.82)',
          pageOverlay: 'rgba(26,10,20,0.56)',
          pageOverlayStrong: 'rgba(26,10,20,0.78)',
          surface: 'rgba(255,129,80,0.10)',
          surfaceBorder: 'rgba(255,186,136,0.18)',
          accent: '#ffd4aa'
        }
      };

      const scaleMap = {
        small: { nav: '1rem' },
        medium: { nav: '1.15rem' },
        large: { nav: '1.22rem' },
        xlarge: { nav: '1.3rem' }
      };

      const navMap = {
        outline: { navBg: themeMap[themePreset].navBg, navBorder: themeMap[themePreset].navBorder },
        solid: { navBg: 'rgba(255,255,255,0.16)', navBorder: 'rgba(255,255,255,0.16)' },
        glass: { navBg: 'rgba(255,255,255,0.08)', navBorder: 'rgba(255,255,255,0.28)' }
      };

      return {
        font: fontMap[fontPreset] || fontMap.gothic,
        theme: themeMap[themePreset] || themeMap.midnight,
        scale: scaleMap[textScalePreset] || scaleMap.medium,
        navStyle: navMap[navStylePreset] || navMap.outline
      };
    }

    function mjssApplySiteStyle(site) {
      const root = document.documentElement;
      const presets = mjssPresetMap(site);

      root.style.setProperty('--font-family', presets.font);
      root.style.setProperty('--bg-top', presets.theme.bgTop);
      root.style.setProperty('--bg-bottom', presets.theme.bgBottom);
      root.style.setProperty('--text-color', presets.theme.text);
      root.style.setProperty('--heading-color', presets.theme.heading);
      root.style.setProperty('--subtext-color', presets.theme.subtext);
      root.style.setProperty('--nav-bg', presets.navStyle.navBg);
      root.style.setProperty('--nav-text', presets.theme.navText);
      root.style.setProperty('--nav-border', presets.navStyle.navBorder);
      root.style.setProperty('--page-overlay', presets.theme.pageOverlay);
      root.style.setProperty('--page-overlay-strong', presets.theme.pageOverlayStrong);
      root.style.setProperty('--surface', presets.theme.surface);
      root.style.setProperty('--surface-border', presets.theme.surfaceBorder);
      root.style.setProperty('--accent-color', presets.theme.accent);

      const bg = mjssBuildImageUrl(site.hero_bg_image);
      if (bg) {
        document.body.classList.add('has-page-bg');
        root.style.setProperty('--page-bg-image', `url('${bg}')`);
      }
    }

    function mjssEscapeHtml(str) {
      return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function mjssRenderBlocks(blocks) {
      if (!Array.isArray(blocks)) return '';
      return blocks.map(block => {
        const type = block.type || 'body';
        const text = mjssEscapeHtml(block.text || '').replaceAll('\\n', '<br>');
        const image = mjssBuildImageUrl(block.image || '');

        if (type === 'hero_title') return `<div class="block-hero-title">${text}</div>`;
        if (type === 'heading') return `<div class="block-heading">${text}</div>`;
        if (type === 'subheading') return `<div class="block-subheading">${text}</div>`;
        if (type === 'quote') return `<div class="block-quote">${text}</div>`;
        if (type === 'emphasis') return `<div class="block-emphasis">${text}</div>`;
        if (type === 'signature') return `<div class="block-signature">${text}</div>`;
        if (type === 'spacer_small') return `<div class="block-spacer-small"></div>`;
        if (type === 'spacer_medium') return `<div class="block-spacer-medium"></div>`;
        if (type === 'spacer_large') return `<div class="block-spacer-large"></div>`;
        if (type === 'image') return image ? `<div class="block-image"><img src="${image}" alt=""></div>` : '';
        return `<div class="block-body">${text}</div>`;
      }).join('');
    }

    async function loadConcept() {
      const [siteRes, conceptRes] = await Promise.all([
        fetch('/data/site.json'),
        fetch('/data/concept-page.json')
      ]);

      const site = await siteRes.json();
      const concept = await conceptRes.json();

      mjssApplySiteStyle(site);

      const wrap = document.getElementById('conceptBlocks');
      wrap.innerHTML = mjssRenderBlocks(concept.blocks || []);
    }

    loadConcept().catch(console.error);
  </script>
</body>
</html>
