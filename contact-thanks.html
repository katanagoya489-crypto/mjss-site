<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>送信完了 | MJSS</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.16);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.72);
      --accent: #76d6ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(118,214,255,0.18), transparent 32%),
        linear-gradient(180deg, #091321 0%, #060c16 100%);
    }

    .card {
      width: min(100%, 720px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 34px 26px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0,0,0,0.28);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(118,214,255,0.12);
      color: var(--accent);
      font-weight: 800;
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    h1 {
      margin: 16px 0 12px;
      font-size: clamp(28px, 5vw, 42px);
    }

    p {
      margin: 0 auto;
      max-width: 48em;
      color: var(--muted);
      line-height: 1.9;
      font-size: 15px;
    }

    .actions {
      margin-top: 22px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      font-weight: 800;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.08);
    }

    a.primary {
      background: linear-gradient(135deg, #8ae2ff 0%, #61bfff 100%);
      color: #07111d;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Thank You</span>
    <h1>送信ありがとうございました</h1>
    <p>
      お問い合わせを受け付けました。内容を確認のうえ、順番にご連絡いたします。
      返信までに少しお時間をいただく場合があります。
    </p>

    <div class="actions">
      <a class="primary" href="/index.html">ホームへ戻る</a>
      <a href="/contact.html">フォームへ戻る</a>
    </div>
  </div>
</body>
</html>
