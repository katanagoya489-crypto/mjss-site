<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MJSS</title>
  <style>
    :root {
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
      --text-color: #ffffff;
      --heading-color: #ffffff;
      --button-text-color: #ffffff;
      --button-border-color: rgba(255,255,255,0.75);
      --button-bg-color: rgba(255,255,255,0.05);
      --nav-text-color: #ffffff;
      --nav-border-color: rgba(255,255,255,0.75);
      --nav-bg-color: rgba(15, 31, 60, 0.55);
      --bg-top-color: #04152e;
      --bg-bottom-color: #08254b;
      --heading-size: 5rem;
      --body-size: 1.2rem;
      --nav-size: 1rem;
      --button-size: 1rem;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-family);
      color: var(--text-color);
      background:
        radial-gradient(circle at top left, rgba(80,120,255,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(0,180,255,0.12), transparent 30%),
        linear-gradient(180deg, var(--bg-top-color), var(--bg-bottom-color));
      min-height: 100vh;
    }

    .site-nav-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
      background: rgba(4, 21, 46, 0.5);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .site-nav {
      max-width: 1680px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      gap: 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .site-nav::-webkit-scrollbar { display: none; }

    .site-nav a {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      padding: 0 30px;
      border-radius: 999px;
      text-decoration: none;
      color: var(--nav-text-color);
      border: 2px solid var(--nav-border-color);
      background: var(--nav-bg-color);
      font-size: var(--nav-size);
      font-weight: 800;
      transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
      white-space: nowrap;
    }

    .site-nav a:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .hero-wrap {
      width: min(100%, 1700px);
      margin: 42px auto 0;
      padding: 0 24px 36px;
    }

    .hero {
      position: relative;
      min-height: 740px;
      border-radius: 40px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
      background:
        linear-gradient(90deg, rgba(7, 21, 46, 0.92) 0%, rgba(7, 21, 46, 0.82) 36%, rgba(7, 21, 46, 0.54) 66%, rgba(7, 21, 46, 0.40) 100%),
        radial-gradient(circle at top left, rgba(80,120,255,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(0,180,255,0.12), transparent 30%),
        linear-gradient(90deg, #0b2148, #08203f);
      background-size: cover;
      background-position: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(5,18,42,0.84) 0%, rgba(5,18,42,0.72) 38%, rgba(5,18,42,0.34) 68%, rgba(5,18,42,0.18) 100%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 760px;
      padding: 96px 72px 90px;
    }

    .hero-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      min-width: 160px;
      padding: 20px 32px;
      border-radius: 38px;
      background: rgba(255,255,255,0.10);
      margin-bottom: 34px;
      overflow: hidden;
    }

    .hero-logo img {
      max-width: 280px;
      max-height: 90px;
      width: auto;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .hero-logo-text {
      color: var(--heading-color);
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .hero h1 {
      margin: 0 0 34px;
      font-size: var(--heading-size);
      line-height: 0.95;
      color: var(--heading-color);
      letter-spacing: -0.03em;
      font-weight: 900;
    }

    .announce {
      display: inline-block;
      margin-bottom: 52px;
      padding: 28px 34px;
      border-radius: 32px;
      border: 2px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 800;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .hero-lead {
      margin: 0 0 48px;
      font-size: var(--body-size);
      line-height: 1.9;
      font-weight: 700;
      color: var(--text-color);
      white-space: pre-wrap;
      max-width: 760px;
    }

    .hero-actions {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .hero-actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 84px;
      padding: 0 34px;
      border-radius: 999px;
      text-decoration: none;
      color: var(--button-text-color);
      border: 2px solid var(--button-border-color);
      background: var(--button-bg-color);
      font-size: var(--button-size);
      font-weight: 900;
      transition: transform 0.2s ease, background 0.2s ease;
      white-space: nowrap;
    }

    .hero-actions a:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.14);
    }

    @media (max-width: 980px) {
      .hero {
        min-height: auto;
      }

      .hero-content {
        padding: 64px 28px 52px;
      }

      .hero h1 {
        font-size: clamp(3rem, 13vw, 4.8rem);
      }

      .hero-logo {
        min-height: 92px;
        min-width: 132px;
        padding: 16px 24px;
        margin-bottom: 24px;
      }

      .hero-logo img {
        max-width: 220px;
        max-height: 64px;
      }

      .hero-logo-text {
        font-size: 2.4rem;
      }

      .announce {
        margin-bottom: 34px;
        padding: 22px 24px;
      }

      .hero-actions a {
        min-height: 68px;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="site-nav-wrap">
    <nav class="site-nav">
      <a href="index.html">ホーム</a>
      <a href="concept.html">理念</a>
      <a href="rules.html">お願い</a>
      <a href="entry.html">参加フォーム</a>
      <a href="next-performers.html">次回参加者</a>
      <a href="past-performers.html">過去参加者</a>
      <a href="creators.html">クリエイター</a>
      <a href="staff.html">スタッフ</a>
      <a href="omake.html">おまけ</a>
      <a href="works.html">仕事依頼</a>
    </nav>
  </div>

  <main class="hero-wrap">
    <section class="hero" id="hero">
      <div class="hero-content">
        <div class="hero-logo" id="heroLogoWrap">
          <span class="hero-logo-text" id="heroLogoText">MJSS</span>
        </div>

        <h1 id="heroTitle">MJSS LIVE</h1>

        <div class="announce" id="heroAnnouncement">最新情報は順次更新予定です。</div>

        <p class="hero-lead" id="heroLead">音楽、配信、表現が交差するライブイベント。
出演者、来場者、クリエイターの“好き”がつながる場所。</p>

        <div class="hero-actions">
          <a href="next-performers.html">次回参加者を見る</a>
          <a href="creators.html">クリエイターを見る</a>
          <a href="entry.html">参加フォームへ</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    async function loadSite() {
      try {
        const res = await fetch('/data/site.json');
        const data = await res.json();

        const root = document.documentElement;
        if (data.font_family) root.style.setProperty('--font-family', data.font_family);
        if (data.text_color) root.style.setProperty('--text-color', data.text_color);
        if (data.heading_color) root.style.setProperty('--heading-color', data.heading_color);
        if (data.button_text_color) root.style.setProperty('--button-text-color', data.button_text_color);
        if (data.button_border_color) root.style.setProperty('--button-border-color', data.button_border_color);
        if (data.button_bg_color) root.style.setProperty('--button-bg-color', data.button_bg_color);
        if (data.nav_text_color) root.style.setProperty('--nav-text-color', data.nav_text_color);
        if (data.nav_border_color) root.style.setProperty('--nav-border-color', data.nav_border_color);
        if (data.nav_bg_color) root.style.setProperty('--nav-bg-color', data.nav_bg_color);
        if (data.bg_top_color) root.style.setProperty('--bg-top-color', data.bg_top_color);
        if (data.bg_bottom_color) root.style.setProperty('--bg-bottom-color', data.bg_bottom_color);
        if (data.heading_size) root.style.setProperty('--heading-size', data.heading_size);
        if (data.body_size) root.style.setProperty('--body-size', data.body_size);
        if (data.nav_size) root.style.setProperty('--nav-size', data.nav_size);
        if (data.button_size) root.style.setProperty('--button-size', data.button_size);

        if (data.site_name) {
          const logoText = document.getElementById('heroLogoText');
          if (logoText) logoText.textContent = data.site_name;
          document.title = data.site_name;
        }
        if (data.hero_title) document.getElementById('heroTitle').textContent = data.hero_title;
        if (data.hero_lead) document.getElementById('heroLead').textContent = data.hero_lead;
        if (data.announcement) document.getElementById('heroAnnouncement').textContent = data.announcement;

        if (data.hero_logo_image) {
          const wrap = document.getElementById('heroLogoWrap');
          const img = document.createElement('img');
          img.src = data.hero_logo_image;
          img.alt = data.site_name || 'logo';
          wrap.innerHTML = '';
          wrap.appendChild(img);
        }

        if (data.hero_bg_image) {
          const hero = document.getElementById('hero');
          const safeUrl = String(data.hero_bg_image).replace(/"/g, '&quot;');
          hero.style.background = `linear-gradient(90deg, rgba(7, 21, 46, 0.92) 0%, rgba(7, 21, 46, 0.82) 36%, rgba(7, 21, 46, 0.54) 66%, rgba(7, 21, 46, 0.40) 100%), url('${safeUrl}') center/cover no-repeat`;
        }
      } catch (e) {
        console.error('site.json の読み込みに失敗しました', e);
      }
    }

    loadSite();
  </script>
</body>
</html>
