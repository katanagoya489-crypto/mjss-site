<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>次回参加者 | MJSS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(180deg, #071326, #0b1d3a);
      color: #fff;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 16px;
    }

    .thumb {
      width: 100%;
      height: 300px;
      border-radius: 12px;
      background: #334;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 14px;
      border: 1px solid #fff;
      border-radius: 20px;
      text-decoration: none;
      color: #fff;
      margin-right: 8px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>次回参加者</h1>
    <div class="grid" id="list"></div>
  </div>

  <script>
    async function load() {
      const res = await fetch('/data/next-performers.json');
      const data = await res.json();
      const list = data.items || [];
      const container = document.getElementById('list');

      list.forEach(item => {
        let img = '';

        if (item.image) {
          if (item.image.startsWith('http')) {
            img = item.image;
          } else if (item.image.startsWith('/')) {
            img = item.image;
          } else {
            img = '/images/uploads/' + item.image;
          }
        }

        const el = document.createElement('div');
        el.className = 'card';

        el.innerHTML = `
          <div class="thumb" ${
            img ? `style="background:url('${img}') center/cover;"` : ''
          }>
            ${img ? '' : '立ち絵枠'}
          </div>

          <h3>${item.name || ''}</h3>
          <p>${item.description || ''}</p>

          ${item.x_url ? `<a class="btn" href="${item.x_url}" target="_blank">Xを見る</a>` : ''}
          ${item.media_url && item.media_url !== '#' ? `<a class="btn" href="${item.media_url}" target="_blank">媒体を見る</a>` : ''}
        `;

        container.appendChild(el);
      });
    }

    load();
  </script>
</body>
</html>
