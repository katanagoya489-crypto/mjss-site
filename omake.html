<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>おまけ | MJSS</title>
  <style>
    :root {
      --font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
      --bg-top: #071326;
      --bg-bottom: #0b1d3a;
      --text-color: #ffffff;
      --heading-color: #ffffff;
      --subtext-color: rgba(255,255,255,0.92);
      --nav-bg: rgba(5,19,40,0.82);
      --nav-text: #ffffff;
      --nav-border: rgba(255,255,255,0.7);
      --page-overlay: rgba(2,14,34,0.66);
      --page-overlay-strong: rgba(2,14,34,0.80);
      --surface: rgba(255,255,255,0.06);
      --surface-border: rgba(255,255,255,0.10);
      --accent-color: #7ff8ec;
      --nav-size: 1.05rem;
      --body-size: 1rem;
      --card-title-size: 1.35rem;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font-family);
      color: var(--text-color);
      font-size: var(--body-size);
      background:
        radial-gradient(circle at top left, rgba(58,116,255,0.14), transparent 26%),
        radial-gradient(circle at top right, rgba(0,153,255,0.10), transparent 30%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    .site-nav-wrap {
      position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px);
      background: rgba(3,13,28,0.76); border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .site-nav {
      width: min(1600px, calc(100% - 24px)); margin: 0 auto; padding: 14px 0;
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center;
    }
    .site-nav a {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 52px; padding: 0 20px; border-radius: 999px;
      background: var(--nav-bg); color: var(--nav-text); border: 2px solid var(--nav-border);
      font-size: var(--nav-size); font-weight: 800; letter-spacing: 0.02em; white-space: nowrap;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .page { width: min(1500px, calc(100% - 20px)); margin: 0 auto; padding: 18px 0 36px; }
    .hero {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px; padding: 22px; backdrop-filter: blur(6px);
      box-shadow: 0 16px 36px rgba(0,0,0,0.18); margin-bottom: 18px;
    }
    .title {
      margin: 0 0 10px; font-size: clamp(1.9rem, 4vw, 3.2rem);
      font-weight: 900; letter-spacing: -0.03em; line-height: 1.18; white-space: pre-wrap;
    }
    .sub {
      margin: 0; color: rgba(255,255,255,0.82); line-height: 1.8;
      white-space: pre-wrap; font-size: 0.98rem;
    }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
    .card {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 22px; overflow: hidden; box-shadow: 0 16px 36px rgba(0,0,0,0.18);
      backdrop-filter: blur(6px); transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,0,0,0.22); }
    .thumb {
      aspect-ratio: 16 / 10; background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      overflow: hidden; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; object-position: center center; }
    .thumb-fallback {
      width: 100%; height: 100%; display: grid; place-items: center; padding: 16px; text-align: center;
      font-weight: 900; font-size: 1.15rem; color: rgba(255,255,255,0.86);
      background:
        radial-gradient(circle at top left, rgba(127,248,236,0.22), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,92,92,0.20), transparent 26%),
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    }
    .card-body { padding: 16px; display: grid; gap: 10px; }
    .badge {
      display: inline-flex; width: fit-content; padding: 7px 12px; border-radius: 999px;
      font-size: 0.82rem; font-weight: 900; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10); color: rgba(255,255,255,0.88);
    }
    .card-title { margin: 0; font-size: var(--card-title-size); font-weight: 900; line-height: 1.35; }
    .desc { margin: 0; color: rgba(255,255,255,0.82); line-height: 1.8; white-space: pre-wrap; font-size: 0.95rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; width: fit-content;
      min-height: 48px; padding: 0 16px; border-radius: 999px; border: 2px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.06); color: #fff; font-weight: 900;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .empty {
      padding: 24px; border-radius: 22px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10); color: rgba(255,255,255,0.78);
    }
    .footer { margin-top: 28px; padding: 16px 0 32px; color: rgba(255,255,255,0.68); text-align: center; font-size: 0.96rem; }
    @media (max-width: 1100px) { .grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 768px) {
      .site-nav { justify-content: flex-start; overflow-x: auto; flex-wrap: nowrap; padding: 12px 0; }
      .site-nav a { min-height: 48px; padding: 0 18px; font-size: 0.96rem; }
      .page { width: calc(100% - 14px); padding: 14px 0 26px; }
      .hero { padding: 16px; border-radius: 18px; }
      .grid { grid-template-columns: 1fr; }
      .card { border-radius: 18px; }
      .card-body { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="site-nav-wrap">
    <nav class="site-nav">
      <a href="index.html">ホーム</a>
      <a href="concept.html">理念</a>
      <a href="rules.html">お願い</a>
      <a href="entry.html">参加フォーム</a>
      <a href="next-performers.html">次回参加者</a>
      <a href="past-performers.html">過去参加者</a>
      <a href="creators.html">クリエイター</a>
      <a href="staff.html">スタッフ</a>
      <a href="omake.html">おまけ</a>
      <a href="works.html">仕事依頼</a>
    </nav>
  </div>
  <main class="page">
    <section class="hero">
      <h1 class="title">おまけ一覧</h1>
      <p class="sub">ミニゲーム、スタッフブログ、隠しコンテンツの入口ページ。
サムネを置いて増やしていけるハブ仕様です。</p>
    </section>
    <section class="grid" id="omakeGrid"></section>
    <div class="footer">© MJSS</div>
  </main>
  <script>
    function mjssSafe(value, fallback = '') {
      return value === undefined || value === null || value === '' ? fallback : value;
    }
    function mjssBuildImageUrl(rawImage) {
      if (!rawImage || typeof rawImage !== 'string') return '';
      const value = rawImage.trim();
      if (!value) return '';
      if (value.startsWith('http://') || value.startsWith('https://')) return value;
      if (value.startsWith('/')) return value;
      if (value.startsWith('images/')) return '/' + value;
      return '/images/uploads/' + value;
    }
    async function loadOmakeLinks() {
      const grid = document.getElementById('omakeGrid');
      try {
        const res = await fetch('/data/omake-links.json');
        const data = await res.json();
        const items = Array.isArray(data.items) ? data.items : [];
        if (items.length === 0) {
          grid.innerHTML = '<div class="empty">まだおまけコンテンツがありません。</div>';
          return;
        }
        grid.innerHTML = items.map(item => {
          const title = mjssSafe(item.title, 'NO TITLE');
          const desc = mjssSafe(item.description, '');
          const href = mjssSafe(item.url, '#');
          const type = mjssSafe(item.type, 'おまけ');
          const image = mjssBuildImageUrl(item.image);
          return `
            <a class="card" href="${href}">
              <div class="thumb">
                ${image ? `<img src="${image}" alt="${title}">` : `<div class="thumb-fallback">${title}</div>`}
              </div>
              <div class="card-body">
                <div class="badge">${type}</div>
                <h2 class="card-title">${title}</h2>
                <p class="desc">${desc}</p>
                <span class="btn">開く</span>
              </div>
            </a>
          `;
        }).join('');
      } catch (e) {
        grid.innerHTML = '<div class="empty">おまけ一覧の読み込みに失敗しました。</div>';
        console.error(e);
      }
    }
    loadOmakeLinks();
  </script>
</body>
</html>
